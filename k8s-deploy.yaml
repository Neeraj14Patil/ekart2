apiVersion: apps/v1
kind: Deployment
metadata:
  name: ekart-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ekart
  template:
    metadata:
      labels:
        app: ekart
    spec:
      containers:
      - name: app
        image: neeraj14patil/ekart-application-image:latest
        ports:
        - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: ekart-service
spec:
  type: NodePort
  selector:
    app: ekart
  ports:
    - port: 80
      targetPort: 8081
      nodePort: 30080
